name: tuya-window-shade-no-reverse
components:
- id: main
  capabilities:
  - id: windowShade
    version: 1
  - id: windowShadeLevel
    version: 1
  - id: switchLevel
    version: 1
  - id: statelessSwitchLevelStep
    version: 1
  - id: windowShadePreset
    version: 1
  categories:
  - name: Blind
preferences:
  - name: fixPercent
    title: "Fix percent"
    description: "In SmartThings, 'fully open' SHOULD be 100% in level and 'fully closed' SHOULD be 0% in level. If shade level percentage is reversed, then turn on this option."
    required: true
    preferenceType: boolean
    definition:
      default: false
  - preferenceId: presetPosition
    explicit: true
  - name: advancedParams
    title: "Advanced Parameters"
    description: "Type advanced option parameters here.(comma separated) If not necessary, leave it blank."
    required: true
    preferenceType: string
    definition:
      stringType: text
      default: ""
deviceConfig:
  dashboard:
    states:
      - component: main
        capability: windowShade
        version: 1
        values: []
        composite: true
      - component: main
        capability: windowShadeLevel
        version: 1
        values:
          - label: ' | {{shadeLevel.value}} {{shadeLevel.unit}}'
        composite: true
        visibleCondition:
          component: main
          capability: windowShade
          version: 1
          value: windowShade.value
          operator: EQUALS
          operand: partially open
          isOffline: false
    actions:
      - component: main
        capability: windowShade
        version: 1
        inline: null
    basicPlus:
      - displayType: panel
        panel:
          items:
            - component: main
              capability: windowShadeLevel
              version: 1
              size: 4x2
              values: []
              visibleConditions: []
          visibleConditions: []
  detailView:
    - component: main
      capability: windowShade
      version: 1
    - component: main
      capability: windowShadeLevel
      version: 1
    - component: main
      capability: statelessSwitchLevelStep
      version: 1
    - component: main
      capability: windowShadePreset
      version: 1
  automation:
    conditions:
      - component: main
        capability: windowShade
        version: 1
      - component: main
        capability: windowShadeLevel
        version: 1
      - component: main
        capability: windowShadePreset
        version: 1
    actions:
      - component: main
        capability: windowShade
        version: 1
      - component: main
        capability: windowShadeLevel
        version: 1
      - component: main
        capability: statelessSwitchLevelStep
        version: 1
      - component: main
        capability: windowShadePreset
        version: 1